name: nns_agent
description: "NNS - Ứng dụng dành cho Đại lý"
publish_to: 'none'

version: 1.0.0+5

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  device_info_plus: ^12.4.0
  url_launcher: ^6.3.2
  vibration: ^3.1.8
  fl_chart: ^1.2.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/nns_agent_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/nns_agent_logo.png"